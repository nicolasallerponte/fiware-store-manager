<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Smart Store{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>
  <body>
    <div class="container">
      <nav class="navbar">
        <a href="{{ url_for('main.dashboard') }}" class="navbar-brand"
          >Smart Store.</a
        >
        <div class="nav-links">
          <a href="{{ url_for('main.dashboard') }}">Overview</a>
          <a href="{{ url_for('stores.index') }}">Stores</a>
          <a href="{{ url_for('products.index') }}">Products</a>
        </div>
      </nav>

      <main>{% block content %}{% endblock %}</main>
    </div>
  </body>
</html>
