version: "3.8"
services:
  orion:
    image: quay.io/fiware/orion:latest
    hostname: orion
    container_name: fiware-orion
    depends_on:
      - mongo-db
    expose:
      - "1026"
    ports:
      - "1026:1026"
    command: -dbURI mongodb://mongo-db -logLevel DEBUG
  mongo-db:
    image: mongo:6.0
    hostname: mongo-db
    container_name: db-mongo
    expose:
      - "27017"
    ports:
      - "27017:27017"
    volumes:
      - mongo-db:/data/db
volumes:
  mongo-db: ~
